<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Bluesky Health Limited-এর বিশেষজ্ঞ চিকিৎসকগণ — ক্যান্সার, হৃদরোগ, শিশু রোগ, গাইনী ও অন্যান্য বিভাগে দেশের সেরা বিশেষজ্ঞরা।">
  <title>বিশেষজ্ঞ চিকিৎসক — Bluesky Health Limited</title>
  <link rel="icon" href="logo.jpeg" type="image/jpeg">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="site-header"></div>

<!-- Page Hero -->
<section class="page-hero">
  <div class="container">
    <h1>বিশেষজ্ঞ চিকিৎসকগণ</h1>
    <p>দেশের সেরা বিশেষজ্ঞ চিকিৎসকরা এখানে সেবা দিচ্ছেন — অ্যাপয়েন্টমেন্টের জন্য কল করুন</p>
    <div class="breadcrumb">
      <a href="index.html">হোম</a> › বিশেষজ্ঞ চিকিৎসক
    </div>
  </div>
</section>

<!-- ══════════ DOCTORS ══════════ -->
<section class="pad bg-white">
  <div class="container">

    <!-- Search & Filter -->
    <div style="display:flex;gap:1rem;flex-wrap:wrap;align-items:center;margin-bottom:1.5rem;">
      <input type="text" id="doctor-search" placeholder="চিকিৎসকের নাম খুঁজুন..."
           style="padding:.65rem 1rem;border:1.5px solid var(--border);border-radius:var(--radius);font-size:.9rem;font-family:inherit;min-width:240px;flex:1;max-width:360px;">
    </div>

    <!-- Category Filter -->
    <div class="filter-bar" id="doctor-filter-bar"></div>

    <!-- Doctors Grid -->
    <div class="doctors-grid" id="doctors-grid"></div>

    <!-- Empty State -->
    <div id="doctors-empty" style="display:none;text-align:center;padding:3rem 0;">
      <p style="color:var(--text-muted);font-size:1rem;">কোনো চিকিৎসক পাওয়া যায়নি।</p>
    </div>

  </div>
</section>

<!-- ══════════ APPOINTMENT CTA ══════════ -->
<section class="pad-sm bg-light">
  <div class="container">
    <div class="callout-strip">
      <div>
        <h3>বিশেষজ্ঞ চিকিৎসকের পরামর্শ নিন</h3>
        <p>অনলাইন ও অফলাইন উভয় পদ্ধতিতে অ্যাপয়েন্টমেন্ট নেওয়া যায়।</p>
      </div>
      <a href="contact.html" class="btn btn-blue">কল করুন ও বুক করুন</a>
    </div>
  </div>
</section>

<div id="site-footer"></div>

<script>try{if(localStorage.getItem('bsky_data_version')!=='2'){['banners','contact','doctors','packages','services','equipment','stats'].forEach(k=>localStorage.removeItem('bsky_'+k));localStorage.setItem('bsky_data_version','2');}}catch(_){}</script>
<script src="data.js"></script>
<script src="components.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const data    = getSiteData();
  const doctors = data.doctors;
  let   active  = "all";

  renderHeader("doctors");
  renderFooter();
  initBannerPopup();

  // Build filter bar (language-aware)
  const filterBar = document.getElementById("doctor-filter-bar");
  filterBar.innerHTML = data.doctorCategories.map(c =>
    `<button class="filter-btn${c.id==="all"?" active":""}" data-cat="${c.id}">${window.l(c.label, c.labelEn)}</button>`
  ).join("");

  filterBar.addEventListener("click", e => {
    const btn = e.target.closest(".filter-btn");
    if (!btn) return;
    active = btn.dataset.cat;
    filterBar.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    render();
  });

  // Search
  const searchInput = document.getElementById("doctor-search");
  // Set placeholder based on language
  if (window.l) searchInput.placeholder = window.l("চিকিৎসকের নাম খুঁজুন...", "Search doctors...");
  searchInput.addEventListener("input", render);

  function render() {
    const q    = document.getElementById("doctor-search").value.toLowerCase();
    const grid = document.getElementById("doctors-grid");
    const empty = document.getElementById("doctors-empty");
    const filtered = doctors.filter(d => {
      const matchCat  = active === "all" || d.category === active;
      const nameBn = (d.name || "").toLowerCase();
      const nameEn = (d.nameEn || "").toLowerCase();
      const specBn = (d.specialtyBn || "").toLowerCase();
      const specEn = (d.specialtyEn || d.specialty || "").toLowerCase();
      const matchName = !q || nameBn.includes(q) || nameEn.includes(q) || specBn.includes(q) || specEn.includes(q);
      return matchCat && matchName;
    });
    grid.innerHTML = filtered.map(doctorCard).join("");
    empty.style.display = filtered.length ? "none" : "block";
  }

  render();
});
</script>
</body>
</html>
